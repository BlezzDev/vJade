plugins {
    id 'java'
}

group = 'com.blezzdev.vjade'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
}

ext {
    lwjglVersion = "3.3.3"
    lwjglNatives = "natives-windows"
}

dependencies {
    implementation 'org.joml:joml:1.10.5'

    implementation 'org.lwjgl:lwjgl-openal:3.3.3'
    implementation 'org.lwjgl:lwjgl-openal:3.3.3:natives-windows'
    implementation 'org.lwjgl:lwjgl-openal:3.3.3:natives-linux'
    implementation 'org.lwjgl:lwjgl-openal:3.3.3:natives-macos'

    implementation "org.lwjgl:lwjgl:${lwjglVersion}"
    implementation "org.lwjgl:lwjgl-glfw:${lwjglVersion}"
    implementation "org.lwjgl:lwjgl-opengl:${lwjglVersion}"
    implementation "org.lwjgl:lwjgl-stb:${lwjglVersion}"

    runtimeOnly "org.lwjgl:lwjgl:${lwjglVersion}:${lwjglNatives}"
    runtimeOnly "org.lwjgl:lwjgl-glfw:${lwjglVersion}:${lwjglNatives}"
    runtimeOnly "org.lwjgl:lwjgl-opengl:${lwjglVersion}:${lwjglNatives}"
    runtimeOnly "org.lwjgl:lwjgl-stb:${lwjglVersion}:${lwjglNatives}"
}